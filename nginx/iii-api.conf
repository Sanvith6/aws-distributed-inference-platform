# Rate limiting zone definition — parsed inside Nginx's main 'http' block since sites-enabled files are included there
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Server block to handle all HTTP traffic and force SSL redirection
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Permanent redirect to HTTPS
    return 301 https://$host$request_uri;
}

# Server block for SSL/TLS terminated traffic
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # Certificates will be generated and placed here by the Ansible role
    ssl_certificate     /etc/nginx/ssl/iii-api.crt;
    ssl_certificate_key /etc/nginx/ssl/iii-api.key;

    # Highly secure modern SSL configuration parameters
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Enable security response headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

    # Primary API Gateway Routing for Inference Calls
    # Enforces rate limiting: 10 requests per second with a burst tolerance of 20
    location /v1/ {
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy parameters pointing to locally bound iii-http engine port 3111
        proxy_pass http://127.0.0.1:3111;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generous timeouts for large language model generation times
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health Check endpoint — direct static 200 JSON response from Nginx
    location /health {
        return 200 '{"status":"healthy","uptime":"active"}';
        add_header Content-Type application/json;
        access_log off; # Turn off access logging to keep disk usage clean
    }

    # Custom Error Pages
    error_page 502 /502.json;
    location = /502.json {
        return 502 '{"error": {"message": "Bad Gateway. The upstream iii engine is not responding or starting up.", "status": 502}}';
        default_type application/json;
    }
}
