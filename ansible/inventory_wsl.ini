[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=/tmp/iii-key.pem
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

[engine_gateway]
engine_gateway_vm ansible_host=44.202.193.89

[inference_worker]
inference_worker_vm ansible_host=10.0.2.59 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -i /tmp/iii-key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p ubuntu@44.202.193.89"'

[caller_worker]
caller_worker_vm ansible_host=10.0.2.50 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -i /tmp/iii-key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p ubuntu@44.202.193.89"'

